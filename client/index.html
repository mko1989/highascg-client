<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>HighAsCG — Direct Playout</title>
	<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
	<link rel="stylesheet" href="styles.css?v=6">
	<link rel="stylesheet" href="/vendor/grapesjs/dist/css/grapes.min.css">

	<!--
		Import map for optional modules. The entries below are inert when the underlying
		npm package isn't installed (`three` is an optionalDependency — only present after
		`npm run install:previs`). Browsers ignore unused import-map entries, so this is
		safe to ship unconditionally. Loaded here (before `app.js`) because import maps
		must exist BEFORE any module script is parsed.
	-->
	<script type="importmap">
	{
		"imports": {
			"three": "/vendor/three/build/three.module.js",
			"three/": "/vendor/three/",
			"three/addons/": "/vendor/three/examples/jsm/",
			"grapesjs": "/vendor/grapesjs/dist/grapes.mjs",
			"html-to-image": "/vendor/html-to-image/es/index.js"
		}
	}
	</script>
</head>
<body>
	<div id="app" class="app">
		<header class="header">
			<div class="header__title">
				<img src="assets/logo.svg" alt="" class="header__logo">
				HighAsCG
			</div>
			<div class="header__status" id="ws-status" aria-label="Connection status">
				<div id="connection-eye-container"></div>
			</div>
		</header>

		<div class="layout">
			<aside class="panel panel-sources" id="panel-sources">
				<div class="panel__header panel__header--with-actions">
					<button type="button" class="panel__collapse-btn" id="panel-sources-collapse" aria-expanded="true" aria-label="Collapse Sources" title="Collapse Sources">«</button>
					<h2>Sources</h2>
				</div>
				<div class="panel__body" id="sources-panel-body"></div>
			</aside>
			<div class="resize-handle resize-handle--sources" id="resize-sources" title="Drag to resize Sources" aria-hidden="true"></div>

			<main class="workspace">
				<div class="workspace__tabs">
					<button class="tab active" data-tab="scenes">Scenes / Looks</button>
					<button class="tab" data-tab="timeline">Timeline Editor</button>
					<button class="tab" data-tab="multiview">Multiview Editor</button>
					<button class="tab" data-tab="device-view">Devices</button>
					<button class="tab" data-tab="streaming" id="tab-btn-streaming" style="display:none">Streaming</button>
				</div>
				<div class="workspace__content">
					<div class="tab-pane active" id="tab-scenes"></div>
					<div class="tab-pane" id="tab-timeline"></div>
					<div class="tab-pane" id="tab-multiview"></div>
					<div class="tab-pane" id="tab-device-view"></div>
					<div class="tab-pane" id="tab-pixelmap"></div>
					<div class="tab-pane" id="tab-streaming"></div>
				</div>
			</main>

			<div class="resize-handle resize-handle--inspector" id="resize-inspector" title="Drag to resize Inspector" aria-hidden="true"></div>
			<aside class="panel panel-inspector" id="panel-inspector">
				<div class="panel__header panel__header--with-actions panel__header--inspector-modes">
					<div class="panel-inspector-modes" role="tablist" aria-label="Right panel">
						<button type="button" class="panel-inspector-mode panel-inspector-mode--active" role="tab" data-inspector-mode="inspector" aria-selected="true">Inspector</button>
						<button type="button" class="panel-inspector-mode" role="tab" data-inspector-mode="layerPresets" aria-selected="false">Layer presets</button>
						<button type="button" class="panel-inspector-mode" role="tab" data-inspector-mode="lookPresets" aria-selected="false">Look presets</button>
					</div>
					<button type="button" class="panel__collapse-btn" id="panel-inspector-collapse" aria-expanded="true" aria-label="Collapse Inspector" title="Collapse Inspector">»</button>
				</div>
				<div class="panel__body panel-inspector__body" id="panel-inspector-body">
					<div class="panel-inspector__scroll" id="panel-inspector-scroll"></div>
					<div class="panel-inspector__audio" id="panel-inspector-audio-mount" aria-label="Program audio section"></div>
				</div>
			</aside>
		</div>
	</div>

	<script type="module" src="app.js?v=6"></script>
</body>
</html>
