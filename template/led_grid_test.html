<!DOCTYPE html>
<!--
  HighAsCG — LED wall grid test pattern (CasparCG HTML template)

  Modes:
  • **Screens** (default on startup): logo + title, then resolution + LAN IPs (larger type), optional circle + cross.
  • **Full grid**: columns × rows panels (Web UI “Full LED grid” per channel).

  Pass JSON via CG UPDATE (same string rules as multiview_overlay.html).
-->
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>LED grid test</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		html, body {
			width: 100%;
			height: 100%;
			overflow: hidden;
			background: #050508;
			font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
		}
		#root {
			position: absolute;
			inset: 0;
			z-index: 1;
			display: grid;
			gap: 0;
			background: #0a0a0f;
		}
		#screensMode {
			display: none;
			position: absolute;
			inset: 0;
			z-index: 4;
			background: transparent;
			overflow: hidden;
		}
		#patternLayer {
			position: absolute;
			inset: 0;
			z-index: 0;
			background: #0a0a0f;
		}
		@keyframes bounceX {
			from { transform: translateX(0); }
			to { transform: translateX(var(--travel-x, 1000px)); }
		}
		@keyframes bounceY {
			from { transform: translateY(0); }
			to { transform: translateY(var(--travel-y, 800px)); }
		}
		.bouncing-character-x {
			position: absolute;
			left: 0;
			top: 0;
			width: var(--bounce-size, 250px);
			height: var(--bounce-size, 250px);
			animation: bounceX 3.7s infinite alternate linear;
			will-change: transform;
		}
		.bouncing-character-y {
			width: 100%;
			height: 100%;
			animation: bounceY 2.9s infinite alternate linear;
			will-change: transform;
		}
		.bouncing-character__img {
			display: block;
			width: 100%;
			height: 100%;
			object-fit: contain;
		}
		.root--transparent-panels {
			background: transparent !important;
		}
		.root--transparent-panels .panel {
			background: rgba(0,0,0,0.15) !important;
			border-color: rgba(255,255,255,0.2) !important;
		}
		#screensMode.screens-mode--on { display: block; }
		/* Grid + overlay: panels below; circle/cross + resolution strip stay visible */
		#screensMode.screens-mode--grid-overlay {
			background: transparent;
			pointer-events: none;
		}
		#screensMode.screens-mode--grid-overlay .brand-stack { z-index: 20; }
		.startup-pattern-cross {
			position: absolute;
			inset: 0;
			pointer-events: none;
			opacity: 0.22;
			z-index: 8;
		}
		.startup-pattern-cross__svg {
			width: 100%;
			height: 100%;
			display: block;
		}
		/* Corner-to-corner diagonals; stroke stays ~constant px on non-square canvases */
		.startup-pattern-cross__line {
			stroke: rgba(180, 200, 255, 0.52);
			stroke-width: 3px;
			vector-effect: non-scaling-stroke;
			fill: none;
			shape-rendering: geometricPrecision;
		}
		/* Perfect circle touching top and bottom of the frame (diameter = viewport height on wide canvases) */
		.startup-pattern-circle {
			position: absolute;
			left: 50%;
			top: 50%;
			transform: translate(-50%, -50%);
			width: auto;
			height: 100%;
			max-height: 100%;
			max-width: 100%;
			aspect-ratio: 1;
			border: 3px solid rgba(160, 190, 255, 0.38);
			border-radius: 50%;
			pointer-events: none;
			z-index: 7;
			box-shadow: 0 0 0 1px rgba(255,255,255,0.04) inset;
			box-sizing: border-box;
		}
		.brand-stack {
			position: absolute;
			left: 50%;
			top: 7%;
			transform: translateX(-50%);
			display: flex;
			flex-direction: column;
			align-items: center;
			text-align: center;
			z-index: 10;
			max-width: 96vw;
			pointer-events: none;
		}
		.brand-title {
			margin-top: 0.35rem;
			font-size: clamp(0.75rem, 1.85vw, 1.05rem);
			font-weight: 600;
			letter-spacing: 0.1em;
			color: rgba(230, 236, 255, 0.92);
			text-shadow: 0 0 18px rgba(100, 160, 255, 0.2), 0 2px 10px rgba(0,0,0,0.75);
		}
		.brand-meta {
			margin-top: 0.85rem;
			font-size: clamp(1.05rem, 3.4vw, 2.35rem);
			font-weight: 700;
			line-height: 1.28;
			letter-spacing: 0.02em;
			color: rgba(248, 250, 255, 0.97);
			text-shadow: 0 2px 16px rgba(0,0,0,0.85), 0 0 28px rgba(80, 140, 255, 0.25);
		}
		.brand-meta__line { display: block; }
		.brand-meta__line--ips { margin-top: 0.35em; font-weight: 650; opacity: 0.98; }
		.gpu-port-badge {
			position: absolute;
			top: 2.5%;
			left: 2.5%;
			z-index: 30;
			padding: 0.15em 0.35em;
			font-family: ui-monospace, 'Cascadia Mono', 'SF Mono', Menlo, monospace;
			font-size: clamp(1.75rem, 7.5vw, 5.5rem);
			font-weight: 800;
			line-height: 1;
			letter-spacing: 0.04em;
			color: #b8ff9a;
			text-shadow:
				0 0 24px rgba(80, 255, 120, 0.45),
				0 2px 12px rgba(0, 0, 0, 0.9);
			pointer-events: none;
		}
		.gpu-port-badge__sub {
			display: block;
			margin-top: 0.2em;
			font-size: 0.28em;
			font-weight: 650;
			letter-spacing: 0.08em;
			color: rgba(220, 240, 255, 0.82);
		}
		.panel {
			position: relative;
			border: 2px solid #2d3140;
			background:
				linear-gradient(145deg, rgba(255,255,255,0.04) 0%, transparent 40%),
				linear-gradient(180deg, #12141c 0%, #0c0e14 100%);
			box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
		}
		.panel:nth-child(4n+1) { background-color: rgba(30, 32, 44, 0.35); }
		.panel:nth-child(4n+3) { background-color: rgba(22, 24, 34, 0.35); }
		.panel__idx {
			position: absolute;
			top: 6px;
			left: 8px;
			font-size: clamp(10px, 1.1vw, 14px);
			font-weight: 600;
			color: rgba(200, 210, 255, 0.45);
			letter-spacing: 0.04em;
			pointer-events: none;
		}
		.panel__cross {
			position: absolute;
			inset: 0;
			pointer-events: none;
			opacity: 0.12;
			background:
				linear-gradient(to right, transparent 49.5%, #445 49.5%, #445 50.5%, transparent 50.5%),
				linear-gradient(to bottom, transparent 49.5%, #445 49.5%, #445 50.5%, transparent 50.5%);
		}
		#center {
			position: absolute;
			left: 50%;
			top: 50%;
			transform: translate(-50%, -50%);
			display: none;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			text-align: center;
			pointer-events: none;
			z-index: 100;
			padding: 0;
			margin: 0;
			background: transparent;
			border: none;
			backdrop-filter: none;
			max-width: 96vw;
		}
		.led-test-eye {
			display: flex;
			align-items: center;
			justify-content: center;
			min-width: 80px;
			min-height: 40px;
		}
		.led-test-eye__img {
			display: block;
			max-width: min(50vw, 420px);
			max-height: min(35vh, 360px);
			width: auto;
			height: auto;
			object-fit: contain;
			object-position: center;
		}
		.led-test-eye__caption {
			margin-top: 0.5rem;
			font-size: clamp(0.75rem, 2.2vw, 1.05rem);
			font-weight: 600;
			letter-spacing: 0.08em;
			color: rgba(240, 244, 255, 0.95);
			text-shadow: 0 0 20px rgba(100, 160, 255, 0.25), 0 2px 8px rgba(0,0,0,0.75);
		}
		#spec {
			position: absolute;
			left: 0;
			right: 0;
			bottom: 0;
			padding: 8px 12px;
			text-align: center;
			font-size: clamp(10px, 1vw, 13px);
			color: rgba(180, 190, 220, 0.55);
			background: linear-gradient(0deg, rgba(0,0,0,0.55), transparent);
			pointer-events: none;
			z-index: 5;
		}
		
		@keyframes spinRadar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
		.radar-sweep {
			position: absolute;
			top: -50%; left: -50%; width: 200%; height: 200%;
			background: conic-gradient(from 0deg, transparent 70%, rgba(0, 255, 0, 0.1) 90%, rgba(0, 255, 0, 0.8) 100%);
			animation: spinRadar 2s linear infinite;
		}
		.radar-grid {
			position: absolute;
			inset: 0;
			background: 
				linear-gradient(rgba(0, 255, 0, 0.2) 1px, transparent 1px) 0 0 / 50px 50px,
				linear-gradient(90deg, rgba(0, 255, 0, 0.2) 1px, transparent 1px) 0 0 / 50px 50px;
		}
		@keyframes scrollStripes { from { background-position: 0 0; } to { background-position: 100px 100px; } }
		.animated-stripes {
			position: absolute; inset: 0;
			background: repeating-linear-gradient(45deg, #000 0, #000 25px, #fff 25px, #fff 50px);
			animation: scrollStripes 1s linear infinite;
		}
		@keyframes pulseCircles { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
		.pulse-circle {
			position: absolute; top: 50%; left: 50%; width: 100px; height: 100px;
			margin-top: -50px; margin-left: -50px; border: 5px solid #0ff; border-radius: 50%;
			animation: pulseCircles 2s cubic-bezier(0.1, 0.8, 0.3, 1) infinite;
		}
		@keyframes noiseScroll { 0% { background-position: 0 0; } 100% { background-position: 100px 100px; } }
		.animated-noise {
			position: absolute; inset: 0;
			background: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
			animation: noiseScroll 0.1s steps(2) infinite;
			opacity: 0.6;
		}
	</style>
</head>
<body>
	<div id="patternLayer"></div>
	<div id="root"></div>
	<div id="screensMode">
		<div id="gpuPortBadge" class="gpu-port-badge" style="display:none;" aria-hidden="true"></div>
		<div id="patternCross" class="startup-pattern-cross" style="display:none;" aria-hidden="true">
			<svg class="startup-pattern-cross__svg" viewBox="0 0 100 100" preserveAspectRatio="none">
				<line class="startup-pattern-cross__line" x1="0" y1="0" x2="100" y2="100" />
				<line class="startup-pattern-cross__line" x1="100" y1="0" x2="0" y2="100" />
			</svg>
		</div>
		<div id="patternCircle" class="startup-pattern-circle"></div>
		<div class="brand-stack">
			<div id="ledTestEyeScreens" class="led-test-eye" role="img" aria-label="HighAsCG">
				<img id="ledTestEyeImgScreens" class="led-test-eye__img" alt="" decoding="async" />
			</div>
			<p id="brandTitle" class="brand-title"></p>
			<div id="brandMeta" class="brand-meta"></div>
		</div>
	</div>
	<div id="center">
		<div id="ledTestEye" class="led-test-eye" role="img" aria-label="HighAsCG">
			<img id="ledTestEyeImg" class="led-test-eye__img" alt="" decoding="async" />
		</div>
		<p id="centerCaption" class="led-test-eye__caption"></p>
	</div>
	<div id="spec" style="display: none;"></div>
	<script src="led_grid_test.js"></script>
</body>
</html>
