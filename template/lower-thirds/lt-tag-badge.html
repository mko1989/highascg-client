<!DOCTYPE html>
<!-- lt-tag-badge.html — Tag Badge Lower Third -->
<html>
<head>
    <meta charset="utf-8">
    <title>Lower Third — Tag Badge</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            background: transparent;
            display: flex;
            font-family: 'Arial', 'Helvetica Neue', sans-serif;
            height: 1080px; width: 1920px;
            overflow: hidden;
            position: relative;
        }
        .lt-tag-badge {
            align-self: flex-end;
            margin: 54px 77px;
        }
        .graphic {
            display: flex;
            align-items: center;
            gap: 0;
            opacity: 0;
        }
        .badge {
            background: var(--primary, #6200ea);
            padding: 8px 35px;
            border-radius: 6px 0 0 6px;
            display: flex;
            align-items: center;
        }
        .badge p {
            font-size: 21px;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }
        .name-panel {
            background: rgba(30, 30, 40, 0.9);
            padding: 8px 42px;
            border-radius: 0 6px 6px 0;
            border-left: 4px solid var(--primary, #6200ea);
        }
        .name-panel h1 {
            font-size: 38px;
            font-weight: 600;
            color: var(--text, #fff);
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <main class="lt-tag-badge">
        <div class="graphic">
            <div class="badge"><p>Title</p></div>
            <div class="name-panel"><h1>Name</h1></div>
        </div>
    </main>
    <script src="../CasparCG-Guide-HTML-Template-master/node_modules/gsap/dist/gsap.js"></script>
    <script src="lt-engine.js"></script>
    <script>
        LTEngine.init({
            containerSel: '.lt-tag-badge',
            titleSel: '.name-panel h1',
            subtitleSel: '.badge p',
            applyStyles: function(style) {
                var root = document.documentElement;
                if (style.primaryColor) root.style.setProperty('--primary', style.primaryColor);
                if (style.textColor) root.style.setProperty('--text', style.textColor);
            },
            animateIn: function() {
                return new Promise(function(resolve) {
                    var g = document.querySelector('.lt-tag-badge .graphic');
                    var badge = g.querySelector('.badge');
                    var namePanel = g.querySelector('.name-panel');
                    var tl = new gsap.timeline({ ease: 'back.out(1.2)', onComplete: resolve });
                    tl.set(g, { opacity: 1 })
                      .fromTo(badge, { scale: 0, transformOrigin: 'right center' }, { scale: 1, duration: 0.45 })
                      .fromTo(namePanel, { scaleX: 0, transformOrigin: 'left center', opacity: 0 }, { scaleX: 1, opacity: 1, duration: 0.5 }, '-=0.15');
                });
            },
            animateOut: function() {
                return new Promise(function(resolve) {
                    var g = document.querySelector('.lt-tag-badge .graphic');
                    var badge = g.querySelector('.badge');
                    var namePanel = g.querySelector('.name-panel');
                    var tl = new gsap.timeline({ ease: 'power2.in', onComplete: resolve });
                    tl.to(namePanel, { scaleX: 0, transformOrigin: 'left center', opacity: 0, duration: 0.35 })
                      .to(badge, { scale: 0, transformOrigin: 'right center', duration: 0.3 }, '-=0.1')
                      .set(g, { opacity: 0 });
                });
            }
        });
    </script>
</body>
</html>
