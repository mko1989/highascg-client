<!DOCTYPE html>
<!-- lt-underline-reveal.html — Underline Reveal Lower Third -->
<html>
<head>
    <meta charset="utf-8">
    <title>Lower Third — Underline Reveal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            background: transparent;
            display: flex;
            font-family: 'Arial', 'Helvetica Neue', sans-serif;
            height: 1080px; width: 1920px;
            overflow: hidden;
            position: relative;
        }
        .lt-underline-reveal {
            align-self: flex-end;
            margin: 54px 96px;
        }
        .graphic {
            display: flex;
            flex-direction: column;
            opacity: 0;
        }
        h1 {
            font-size: 54px;
            font-weight: 700;
            color: var(--text, #fff);
            text-shadow: 0 3px 12px rgba(0,0,0,0.6);
            margin-bottom: 4px;
        }
        .line {
            height: 5px;
            background: linear-gradient(90deg, var(--primary, #f44336), var(--primary-alt, #ff9800));
            transform-origin: left;
            margin-bottom: 6px;
        }
        p {
            font-size: 25px;
            font-weight: 400;
            color: var(--text, rgba(255,255,255,0.85));
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
            letter-spacing: 0.04em;
        }
    </style>
</head>
<body>
    <main class="lt-underline-reveal">
        <div class="graphic">
            <h1>Name</h1>
            <div class="line"></div>
            <p>Title</p>
        </div>
    </main>
    <script src="../CasparCG-Guide-HTML-Template-master/node_modules/gsap/dist/gsap.js"></script>
    <script src="lt-engine.js"></script>
    <script>
        LTEngine.init({
            containerSel: '.lt-underline-reveal',
            titleSel: 'h1',
            subtitleSel: 'p',
            applyStyles: function(style) {
                var root = document.documentElement;
                if (style.primaryColor) root.style.setProperty('--primary', style.primaryColor);
                if (style.textColor) root.style.setProperty('--text', style.textColor);
            },
            animateIn: function() {
                return new Promise(function(resolve) {
                    var g = document.querySelector('.lt-underline-reveal .graphic');
                    var h1 = g.querySelector('h1');
                    var line = g.querySelector('.line');
                    var p = g.querySelector('p');
                    var tl = new gsap.timeline({ ease: 'power2.out', onComplete: resolve });
                    tl.set(g, { opacity: 1 })
                      .fromTo(line, { scaleX: 0 }, { scaleX: 1, duration: 0.6 })
                      .fromTo(h1, { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.5 }, '-=0.3')
                      .fromTo(p, { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.45 }, '-=0.2');
                });
            },
            animateOut: function() {
                return new Promise(function(resolve) {
                    var g = document.querySelector('.lt-underline-reveal .graphic');
                    var h1 = g.querySelector('h1');
                    var line = g.querySelector('.line');
                    var p = g.querySelector('p');
                    var tl = new gsap.timeline({ ease: 'power2.in', onComplete: resolve });
                    tl.to(p, { opacity: 0, y: 10, duration: 0.35 })
                      .to(h1, { opacity: 0, y: 20, duration: 0.4 }, '-=0.15')
                      .to(line, { scaleX: 0, duration: 0.4 }, '-=0.2')
                      .set(g, { opacity: 0 });
                });
            }
        });
    </script>
</body>
</html>
