<!DOCTYPE html>
<!-- lt-corner-bracket.html — Corner Bracket Lower Third -->
<html>
<head>
    <meta charset="utf-8">
    <title>Lower Third — Corner Bracket</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            background: transparent;
            display: flex;
            font-family: 'Arial', 'Helvetica Neue', sans-serif;
            height: 1080px; width: 1920px;
            overflow: hidden;
            position: relative;
        }
        .lt-corner-bracket {
            align-self: flex-end;
            margin: 54px 96px;
        }
        .graphic {
            position: relative;
            padding: 15px 54px;
            opacity: 0;
        }
        /* Corner bracket decorations */
        .bracket-tl, .bracket-tr, .bracket-bl, .bracket-br {
            position: absolute;
            width: 29px; height: 29px;
            border-color: var(--primary, #00e676);
            border-style: solid;
            border-width: 0;
        }
        .bracket-tl { top: 0; left: 0; border-top-width: 4px; border-left-width: 4px; }
        .bracket-tr { top: 0; right: 0; border-top-width: 4px; border-right-width: 4px; }
        .bracket-bl { bottom: 0; left: 0; border-bottom-width: 4px; border-left-width: 4px; }
        .bracket-br { bottom: 0; right: 0; border-bottom-width: 4px; border-right-width: 4px; }
        h1 {
            font-size: 46px;
            font-weight: 600;
            color: var(--text, #fff);
            text-shadow: 0 2px 10px rgba(0,0,0,0.6);
            margin-bottom: 2px;
        }
        p {
            font-size: 23px;
            font-weight: 400;
            color: var(--primary, #00e676);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            text-shadow: 0 1px 5px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <main class="lt-corner-bracket">
        <div class="graphic">
            <div class="bracket-tl"></div>
            <div class="bracket-tr"></div>
            <div class="bracket-bl"></div>
            <div class="bracket-br"></div>
            <h1>Name</h1>
            <p>Title</p>
        </div>
    </main>
    <script src="../CasparCG-Guide-HTML-Template-master/node_modules/gsap/dist/gsap.js"></script>
    <script src="lt-engine.js"></script>
    <script>
        LTEngine.init({
            containerSel: '.lt-corner-bracket',
            titleSel: 'h1',
            subtitleSel: 'p',
            applyStyles: function(style) {
                var root = document.documentElement;
                if (style.primaryColor) root.style.setProperty('--primary', style.primaryColor);
                if (style.textColor) root.style.setProperty('--text', style.textColor);
            },
            animateIn: function() {
                return new Promise(function(resolve) {
                    var g = document.querySelector('.lt-corner-bracket .graphic');
                    var brackets = g.querySelectorAll('[class^="bracket-"]');
                    var h1 = g.querySelector('h1');
                    var p = g.querySelector('p');
                    var tl = new gsap.timeline({ ease: 'power2.out', onComplete: resolve });
                    tl.set(g, { opacity: 1 })
                      .fromTo(brackets, { scale: 0 }, { scale: 1, duration: 0.4, stagger: 0.06 })
                      .fromTo(h1, { opacity: 0, y: 12 }, { opacity: 1, y: 0, duration: 0.45 }, '-=0.2')
                      .fromTo(p, { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.4 }, '-=0.2');
                });
            },
            animateOut: function() {
                return new Promise(function(resolve) {
                    var g = document.querySelector('.lt-corner-bracket .graphic');
                    var brackets = g.querySelectorAll('[class^="bracket-"]');
                    var tl = new gsap.timeline({ ease: 'power2.in', onComplete: resolve });
                    tl.to(g.querySelector('p'), { opacity: 0, duration: 0.3 })
                      .to(g.querySelector('h1'), { opacity: 0, duration: 0.3 }, '-=0.15')
                      .to(brackets, { scale: 0, duration: 0.3, stagger: 0.04 }, '-=0.15')
                      .set(g, { opacity: 0 });
                });
            }
        });
    </script>
</body>
</html>
