<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PIP Glow Overlay</title>
<style>
	* { margin: 0; padding: 0; box-sizing: border-box; }
	html, body {
		width: 100%; height: 100%;
		overflow: hidden;
		background: transparent !important;
	}
	#root {
		position: absolute;
		inset: 0;
		pointer-events: none;
		overflow: hidden;
		opacity: var(--layer-o, 1);
	}
	.pip-frame {
		position: absolute;
		left: calc(var(--il) * 100%);
		top: calc(var(--it) * 100%);
		width: calc(var(--iw) * 100%);
		height: calc(var(--ih) * 100%);
		border-radius: var(--r, 0);
		pointer-events: none;
		box-sizing: border-box;
		overflow: visible;
	}
	.pip-frame.side-outside {
		box-shadow: 0 0 var(--i) var(--w) var(--c);
	}
	.pip-frame.side-inside {
		box-shadow: inset 0 0 var(--i) var(--w) var(--c);
	}
	.pip-frame.pulse {
		animation: glow-pulse var(--ps, 2s) ease-in-out infinite alternate;
	}
	@keyframes glow-pulse {
		0% { opacity: var(--min-o, 0.4); }
		100% { opacity: 1; }
	}
</style>
</head>
<body>
<div id="root"></div>
<script>
(function () {
	var root = document.getElementById('root')
	var state = {
		color: '#e63946',
		intensity: 15,
		width: 0,
		pulse: true,
		pulseSpeed: 2,
		minOpacity: 0.4,
		radius: 0,
		side: 'outside',
		opacity: 1,
		segmentation: 0,
		inner: null,
		slices: [],
		liveFile: null,
	}

	var livePollId = null
	var lastLiveRaw = ''

	function clamp01(x) {
		var n = Number(x)
		return isFinite(n) ? Math.max(0, Math.min(1, n)) : 0
	}

	function readInner(d) {
		if (!d || !d.inner || typeof d.inner !== 'object') return null
		return { l: clamp01(d.inner.l), t: clamp01(d.inner.t), w: clamp01(d.inner.w), h: clamp01(d.inner.h) }
	}

	function hasMargin(inn) {
		if (!inn) return false
		var w = inn.w != null ? inn.w : (inn.width != null ? inn.width : 0)
		var h = inn.h != null ? inn.h : (inn.height != null ? inn.height : 0)
		return w > 0 && h > 0
	}

	function normalizeSlice(s) {
		return {
			l: clamp01(s.x != null ? s.x : s.l),
			t: clamp01(s.y != null ? s.y : s.t),
			w: clamp01(s.w),
			h: clamp01(s.h),
		}
	}

	function activeSlices() {
		var slices = state.slices || []
		if (slices.length === 0 && state.inner && hasMargin(state.inner)) {
			return [state.inner]
		}
		return slices.map(normalizeSlice).filter(hasMargin)
	}

	function styleFrame(frame, inn) {
		if (!frame || !inn) return
		frame.style.setProperty('--il', String(inn.l))
		frame.style.setProperty('--it', String(inn.t))
		frame.style.setProperty('--iw', String(inn.w))
		frame.style.setProperty('--ih', String(inn.h))
		frame.style.setProperty('--i', state.intensity + 'px')
		frame.style.setProperty('--w', (state.width || 0) + 'px')
		frame.style.setProperty('--c', state.color)
		frame.style.setProperty('--ps', state.pulseSpeed + 's')
		frame.style.setProperty('--min-o', String(state.minOpacity))
		frame.style.setProperty('--r', (state.radius || 0) + 'px')

		frame.className = 'pip-frame side-' + (state.side || 'outside')
		if (state.pulse) frame.classList.add('pulse')

		if (state.segmentation > 0) {
			var s = state.segmentation * 4
			var gap = 5
			var step = 360 / s
			var mask = 'repeating-conic-gradient(from -' + (gap / 2) + 'deg, transparent 0deg, transparent ' + gap + 'deg, black ' + gap + 'deg, black ' + step + 'deg)'
			frame.style.maskImage = mask
			frame.style.webkitMaskImage = mask
		} else {
			frame.style.maskImage = ''
			frame.style.webkitMaskImage = ''
		}
	}

	var layoutKey = ''

	function sliceLayoutKey(slices) {
		var out = []
		for (var i = 0; i < slices.length; i++) {
			var s = slices[i]
			out.push([s.l, s.t, s.w, s.h].join(','))
		}
		return out.join('|')
	}

	function render() {
		root.style.setProperty('--layer-o', String(clamp01(state.opacity)))
		var slices = activeSlices()
		var key = sliceLayoutKey(slices)
		var frames = root.querySelectorAll('.pip-frame')
		if (key !== layoutKey || frames.length !== slices.length) {
			root.innerHTML = ''
			slices.forEach(function () {
				var frame = document.createElement('div')
				frame.className = 'pip-frame'
				root.appendChild(frame)
			})
			layoutKey = key
			frames = root.querySelectorAll('.pip-frame')
		}
		for (var i = 0; i < slices.length; i++) {
			if (frames[i]) styleFrame(frames[i], slices[i])
		}
	}

	window['play'] = function () {}
	window['stop'] = function () {}
	window['next'] = function () {}

	function applyFromData(d) {
		if (!d) return
		if (d.color != null) state.color = String(d.color)
		if (d.intensity != null) state.intensity = parseFloat(d.intensity) || 15
		if (d.pulse != null) state.pulse = !!d.pulse
		if (d.pulseSpeed != null) state.pulseSpeed = parseFloat(d.pulseSpeed) || 2
		if (d.minOpacity != null) state.minOpacity = parseFloat(d.minOpacity)
		if (d.radius != null) state.radius = parseFloat(d.radius) || 0
		if (d.side != null) state.side = String(d.side)
		if (d.width != null) state.width = parseFloat(d.width) || 0
		if (d.segmentation != null) state.segmentation = parseFloat(d.segmentation) || 0
		if (d.opacity != null) state.opacity = clamp01(parseFloat(d.opacity))
		state.inner = readInner(d)
		if (Array.isArray(d.slices)) {
			state.slices = d.slices.map(function (s) {
				return {
					x: clamp01(s.x),
					y: clamp01(s.y),
					w: clamp01(s.w),
					h: clamp01(s.h),
				}
			})
		}
		render()
	}

	function pollLiveFile() {
		if (!state.liveFile) return
		var xhr = new XMLHttpRequest()
		xhr.open('GET', state.liveFile + '?_=' + Date.now(), true)
		xhr.onload = function () {
			if (xhr.status !== 200 && xhr.status !== 0) return
			if (xhr.responseText === lastLiveRaw) return
			lastLiveRaw = xhr.responseText
			try {
				applyFromData(JSON.parse(xhr.responseText))
			} catch (e) { console.warn('pip_glow live:', e) }
		}
		xhr.send(null)
	}

	function ensureLivePoll(file) {
		if (file) state.liveFile = String(file)
		if (!state.liveFile) return
		if (!livePollId) {
			livePollId = setInterval(pollLiveFile, 33)
			pollLiveFile()
		}
	}

	window['update'] = function (raw) {
		try {
			var d = typeof raw === 'string' ? JSON.parse(raw.replace(/\\"/g, '"').replace(/^"|"$/g, '')) : raw
			if (d.liveFile) ensureLivePoll(d.liveFile)
			applyFromData(d)
		} catch (e) { console.warn('pip_glow update:', e) }
	}

	render()
})()
</script>
</body>
</html>
