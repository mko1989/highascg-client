<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
  <title>HighAsCG</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>HighAsCG</h1>
  <div class="row">
    <span class="label">ISO</span>
    <span id="isoPath" class="path">(not set)</span>
    <button type="button" id="btnIso">Open…</button>
  </div>
  <div class="row">
    <span class="label">HighAsCG</span>
    <span id="appPath" class="path">(not set)</span>
    <button type="button" id="btnApp">Open…</button>
  </div>
  <div class="actions">
    <button type="button" class="primary" id="btnUsb">Create bootable drive</button>
    <button type="button" id="btnSim">Run sim</button>
    <button type="button" id="btnCopy">Copy commands</button>
  </div>
  <textarea id="cmds" readonly spellcheck="false" placeholder="Commands appear here…"></textarea>
  <p id="status">Open ISO and HighAsCG, then choose an action.</p>
  <script src="renderer.js"></script>
</body>
</html>
