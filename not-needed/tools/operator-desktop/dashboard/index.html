<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HighAsCG</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0; padding: 24px; background: #1a1a1e; color: #e8e8ec;
      max-width: 720px;
    }
    h1 { font-size: 1.35rem; font-weight: 600; margin: 0 0 20px; }
    .row {
      display: grid;
      grid-template-columns: 88px 1fr auto;
      gap: 10px; align-items: center; margin-bottom: 12px;
    }
    .path {
      font-size: 0.8rem; color: #9a9aa3; word-break: break-all;
      min-height: 1.2em;
    }
    .path.set { color: #e8e8ec; }
    button {
      font: inherit; cursor: pointer; border-radius: 8px; border: none;
      padding: 8px 14px; background: #3a3a44; color: #fff;
    }
    button:hover { background: #4a4a56; }
    button.primary { background: #2d6cdf; }
    button.primary:hover { background: #3a7aef; }
    .actions { display: flex; gap: 10px; margin: 18px 0 12px; flex-wrap: wrap; }
    #cmds {
      width: 100%; min-height: 220px; font-family: Menlo, Monaco, monospace;
      font-size: 12px; line-height: 1.45; padding: 12px; border-radius: 8px;
      border: 1px solid #3a3a44; background: #0f0f12; color: #c8e6c9;
      resize: vertical;
    }
    #status { font-size: 0.85rem; color: #7a7a85; margin-top: 10px; }
    #status.ok { color: #6bcb77; }
    #status.err { color: #e57373; }
  </style>
</head>
<body>
  <h1>HighAsCG</h1>
  <div class="row">
    <label>ISO</label>
    <div id="isoPath" class="path">(not set)</motion.div>
    <button type="button" id="btnIso">Open…</button>
  </div>
  <div class="row">
    <label>HighAsCG</label>
    <motion.div id="appPath" class="path">(not set)</div>
    <button type="button" id="btnApp">Open…</button>
  </div>
  <div class="actions">
    <button type="button" class="primary" id="btnUsb">Create bootable drive</button>
    <button type="button" id="btnSim">Run sim</button>
    <button type="button" id="btnCopy">Copy commands</button>
  </div>
  <textarea id="cmds" readonly spellcheck="false" placeholder="Commands appear here…"></textarea>
  <p id="status">Open ISO and HighAsCG, then choose an action.</p>
  <script>
    const isoEl = document.getElementById('isoPath');
    const appEl = document.getElementById('appPath');
    const cmds = document.getElementById('cmds');
    const status = document.getElementById('status');

    function setStatus(msg, kind) {
      status.textContent = msg;
      status.className = kind || '';
    }

    async function api(path, opts) {
      const r = await fetch(path, opts);
      const j = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(j.error || r.statusText);
      return j;
    }

    function setPath(el, p) {
      el.textContent = p || '(not set)';
      el.classList.toggle('set', !!p);
    }

    document.getElementById('btnIso').onclick = async () => {
      try {
        const j = await api('/api/pick/iso', { method: 'POST' });
        if (j.path) setPath(isoEl, j.path);
      } catch (e) {
        if (e.message !== 'cancelled') setStatus(e.message, 'err');
      }
    };

    document.getElementById('btnApp').onclick = async () => {
      try {
        const j = await api('/api/pick/app', { method: 'POST' });
        if (j.path) setPath(appEl, j.path);
      } catch (e) {
        if (e.message !== 'cancelled') setStatus(e.message, 'err');
      }
    };

    async function loadPaths() {
      const j = await api('/api/state');
      if (j.iso) setPath(isoEl, j.iso);
      if (j.app) setPath(appEl, j.app);
    }

    document.getElementById('btnUsb').onclick = async () => {
      try {
        const j = await api('/api/commands/usb', { method: 'POST' });
        cmds.value = j.commands || '';
        await navigator.clipboard.writeText(cmds.value);
        setStatus('Bootable-drive commands copied to clipboard.', 'ok');
      } catch (e) {
        setStatus(e.message, 'err');
      }
    };

    document.getElementById('btnSim').onclick = async () => {
      try {
        const j = await api('/api/commands/sim', { method: 'POST' });
        cmds.value = j.commands || '';
        await navigator.clipboard.writeText(cmds.value);
        if (j.started) setStatus('Simulation starting — check Terminal.', 'ok');
        else setStatus(j.note || 'Commands copied.', 'ok');
      } catch (e) {
        setStatus(e.message, 'err');
      }
    };

    document.getElementById('btnCopy').onclick = async () => {
      if (!cmds.value.trim()) { setStatus('Nothing to copy.', 'err'); return; }
      await navigator.clipboard.writeText(cmds.value);
      setStatus('Copied to clipboard.', 'ok');
    };

    loadPaths().catch(() => {});
  </script>
</body>
</html>
