<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PIP Glow Overlay</title>
<style>
	* { margin: 0; padding: 0; box-sizing: border-box; }
	html, body {
		width: 100%; height: 100%;
		overflow: hidden;
		background: transparent !important;
	}
	#root {
		position: absolute;
		inset: 0;
		pointer-events: none;
		overflow: hidden;
		opacity: var(--layer-o, 1);
	}
	#pip-frame {
		position: absolute;
		left: calc(var(--il) * 100%);
		top: calc(var(--it) * 100%);
		width: calc(var(--iw) * 100%);
		height: calc(var(--ih) * 100%);
		border-radius: var(--r, 0);
		pointer-events: none;
		box-sizing: border-box;
		overflow: visible;
	}
	#pip-frame.side-outside {
		box-shadow: 0 0 var(--i) var(--w) var(--c);
	}
	#pip-frame.side-inside {
		box-shadow: inset 0 0 var(--i) var(--w) var(--c);
	}
	
	.pulse {
		animation: glow-pulse var(--ps, 2s) ease-in-out infinite alternate;
	}
	@keyframes glow-pulse {
		0% { opacity: var(--min-o, 0.4); }
		100% { opacity: 1; }
	}
</style>
</head>
<body>
<div id="root">
	<div id="pip-frame"></div>
</div>
<script>
(function () {
	var root = document.getElementById('root')
	var frame = document.getElementById('pip-frame')
	var state = {
		color: '#e63946',
		intensity: 15,
		width: 0,
		pulse: true,
		pulseSpeed: 2,
		minOpacity: 0.4,
		radius: 0,
		side: 'outside',
		opacity: 1,
		segmentation: 0,
		inner: null,
	}

	function clamp01(x) {
		var n = Number(x)
		return isFinite(n) ? Math.max(0, Math.min(1, n)) : 0
	}

	function readInner(d) {
		if (!d || !d.inner || typeof d.inner !== 'object') return null
		return { l: clamp01(d.inner.l), t: clamp01(d.inner.t), w: clamp01(d.inner.w), h: clamp01(d.inner.h) }
	}

	function hasMargin(inn) {
		return !!inn
	}

	function apply() {
		var inn = state.inner
		if (!inn || !hasMargin(inn)) {
			frame.style.display = 'none'
			return
		}
		frame.style.display = 'block'
		frame.style.setProperty('--il', String(inn.l))
		frame.style.setProperty('--it', String(inn.t))
		frame.style.setProperty('--iw', String(inn.w))
		frame.style.setProperty('--ih', String(inn.h))
		frame.style.setProperty('--i', state.intensity + 'px')
		frame.style.setProperty('--w', (state.width || 0) + 'px')
		frame.style.setProperty('--c', state.color)
		frame.style.setProperty('--ps', state.pulseSpeed + 's')
		frame.style.setProperty('--min-o', String(state.minOpacity))
		frame.style.setProperty('--r', (state.radius || 0) + 'px')

		frame.className = 'side-' + (state.side || 'outside')
		if (state.pulse) frame.classList.add('pulse')
		else frame.classList.remove('pulse')

		root.style.setProperty('--layer-o', String(clamp01(state.opacity)))

		if (state.segmentation > 0) {
			var s = state.segmentation * 4
			var gap = 5
			var step = 360 / s
			var mask = 'repeating-conic-gradient(from -' + (gap/2) + 'deg, transparent 0deg, transparent ' + gap + 'deg, black ' + gap + 'deg, black ' + step + 'deg)'
			frame.style.maskImage = mask
			frame.style.webkitMaskImage = mask
		} else {
			frame.style.maskImage = ''
			frame.style.webkitMaskImage = ''
		}
	}

	window['play'] = function () {}
	window['stop'] = function () {}
	window['next'] = function () {}

	window['update'] = function (raw) {
		try {
			var d = typeof raw === 'string' ? JSON.parse(raw.replace(/\\"/g, '"').replace(/^"|"$/g, '')) : raw
			if (!d) return
			if (d.color != null) state.color = String(d.color)
			if (d.intensity != null) state.intensity = parseFloat(d.intensity) || 15
			if (d.pulse != null) state.pulse = !!d.pulse
			if (d.pulseSpeed != null) state.pulseSpeed = parseFloat(d.pulseSpeed) || 2
			if (d.minOpacity != null) state.minOpacity = parseFloat(d.minOpacity)
			if (d.radius != null) state.radius = parseFloat(d.radius) || 0
			if (d.side != null) state.side = String(d.side)
			if (d.width != null) state.width = parseFloat(d.width) || 0
			if (d.segmentation != null) state.segmentation = parseFloat(d.segmentation) || 0
			if (d.opacity != null) state.opacity = clamp01(parseFloat(d.opacity))
			state.inner = readInner(d)
			apply()
		} catch (e) { console.warn('pip_glow update:', e) }
	}

	apply()
})()
</script>
</body>
</html>
