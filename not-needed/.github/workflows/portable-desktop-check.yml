# WO-50: syntax-check simulation launcher without full install (no npm ci).
name: portable-desktop launcher

on:
  push:
  pull_request:

jobs:
  launch-sim-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm run portable:sim:check
      - run: npm run smoke:wo47-manifest
